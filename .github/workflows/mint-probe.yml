name: Mint Probe

# One-time investigation: are the aDAO NFT mint events recoverable via RPC?
# Reads only — writes nothing, commits nothing. Trigger from the Actions tab,
# then read the output in the run log. Deletes cleanly once we have our answer.

on:
  workflow_dispatch:
    inputs:
      contract:
        description: 'NFT contract to probe (defaults to aDAO)'
        required: false
        type: string
        default: 'terra1phr9fngjv7a8an4dhmhd0u0f98wazxfnzccqtyheq4zqrrp4fpuqw3apw9'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run mint probe
        env:
          NFT_CONTRACT: ${{ github.event.inputs.contract }}
        run: node .github/scripts/mint-probe/probe-mints.js
