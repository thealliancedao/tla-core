name: Price Backfill

# On-demand historical price + LST-ratio backfill. Pick a token from the
# dropdown in the Actions tab and run. Writes month-files to price-history/.

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run ALL tokens (ignores the token picker below). Bases first, LSTs self-cleaned.'
        required: false
        type: boolean
        default: false
      token:
        description: 'Token to backfill (used only if Run ALL is unchecked)'
        required: true
        type: choice
        options:
          - LUNA
          - ATOM
          - INJ
          - wBTC
          - ETH
          - USDC
          - USDT
          - PAXG
          - EURe
          - ASTRO
          - CAPA
          - SOLID
          - ROAR
          - ampLUNA
          - arbLUNA
          - bLUNA
          - ampCAPA
      backfill_from:
        description: 'Backfill from date (YYYY-MM-DD). Default = TLA genesis.'
        required: false
        default: '2022-10-31'
      purge_before:
        description: 'PURGE mode: remove this token entries BEFORE this date (YYYY-MM-DD). Leave blank for normal backfill.'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run backfill
        env:
          TOKEN: ${{ github.event.inputs.token }}
          BACKFILL_FROM: ${{ github.event.inputs.backfill_from }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: thealliancedao/tla-core
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_PLAN: pro
          PURGE_BEFORE: ${{ github.event.inputs.purge_before }}
          RUN_ALL: ${{ github.event.inputs.run_all }}
        run: node .github/scripts/price-history/backfill.js
